<svg xmlns="http://www.w3.org/2000/svg" width="600" height="500" viewBox="0 0 600 500">
  <!-- Background -->
  <rect width="600" height="500" fill="#ffffff" rx="0"/>

  <!-- Header -->
  <rect x="0" y="0" width="600" height="60" fill="#2264c0" rx="0"/>
  <text x="300" y="38" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">Panduan Ukuran Logo</text>

  <!-- Metode Pembayaran Section -->
  <text x="30" y="90" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1b1b18">METODE PEMBAYARAN</text>
  <text x="30" y="108" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Simpan di: public/images/metopem/</text>

  <!-- QRIS Box -->
  <rect x="30" y="120" width="110" height="140" fill="#f3f4f6" rx="10"/>
  <rect x="30" y="120" width="110" height="40" fill="#2264c0" rx="10"/>
  <text x="85" y="144" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">QRIS</text>
  <text x="85" y="168" font-family="Arial, sans-serif" font-size="8" fill="#5f6368" text-anchor="middle">qris.png / svg</text>
  <rect x="50" y="175" width="70" height="70" fill="#ffffff" rx="4" stroke="#2264c0" stroke-width="1"/>
  <text x="85" y="205" font-family="Arial, sans-serif" font-size="9" fill="#2264c0" text-anchor="middle">80 x 80</text>
  <text x="85" y="255" font-family="Arial, sans-serif" font-size="8" fill="#2264c0" text-anchor="middle">px (square)</text>

  <!-- BCA Box -->
  <rect x="160" y="120" width="110" height="140" fill="#f3f4f6" rx="10"/>
  <rect x="160" y="120" width="110" height="40" fill="#1a1a6c" rx="10"/>
  <text x="215" y="144" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">BCA</text>
  <text x="215" y="168" font-family="Arial, sans-serif" font-size="8" fill="#5f6368" text-anchor="middle">bca.png / svg</text>
  <rect x="180" y="175" width="70" height="70" fill="#ffffff" rx="4" stroke="#1a1a6c" stroke-width="1"/>
  <text x="215" y="205" font-family="Arial, sans-serif" font-size="9" fill="#1a1a6c" text-anchor="middle">80 x 80</text>
  <text x="215" y="255" font-family="Arial, sans-serif" font-size="8" fill="#1a1a6c" text-anchor="middle">px (square)</text>

  <!-- BNI Box -->
  <rect x="290" y="120" width="110" height="140" fill="#f3f4f6" rx="10"/>
  <rect x="290" y="120" width="110" height="40" fill="#e87722" rx="10"/>
  <text x="345" y="144" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">BNI</text>
  <text x="345" y="168" font-family="Arial, sans-serif" font-size="8" fill="#5f6368" text-anchor="middle">bni.png / svg</text>
  <rect x="310" y="175" width="70" height="70" fill="#ffffff" rx="4" stroke="#e87722" stroke-width="1"/>
  <text x="345" y="205" font-family="Arial, sans-serif" font-size="9" fill="#e87722" text-anchor="middle">80 x 80</text>
  <text x="345" y="255" font-family="Arial, sans-serif" font-size="8" fill="#e87722" text-anchor="middle">px (square)</text>

  <!-- Ekspedisi Section -->
  <text x="30" y="300" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1b1b18">EKSPEDISI</text>
  <text x="30" y="318" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Simpan di: public/images/ekspedisi/</text>

  <!-- JNE Box -->
  <rect x="30" y="330" width="110" height="140" fill="#f3f4f6" rx="10"/>
  <rect x="30" y="330" width="110" height="40" fill="#333333" rx="10"/>
  <text x="85" y="354" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">JNE</text>
  <text x="85" y="378" font-family="Arial, sans-serif" font-size="8" fill="#5f6368" text-anchor="middle">jne.png / svg</text>
  <rect x="50" y="385" width="70" height="70" fill="#ffffff" rx="4" stroke="#333333" stroke-width="1"/>
  <text x="85" y="415" font-family="Arial, sans-serif" font-size="9" fill="#333333" text-anchor="middle">80 x 80</text>
  <text x="85" y="465" font-family="Arial, sans-serif" font-size="8" fill="#333333" text-anchor="middle">px (square)</text>

  <!-- J&T Box -->
  <rect x="160" y="330" width="110" height="140" fill="#f3f4f6" rx="10"/>
  <rect x="160" y="330" width="110" height="40" fill="#e60000" rx="10"/>
  <text x="215" y="354" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">J&amp;T</text>
  <text x="215" y="378" font-family="Arial, sans-serif" font-size="8" fill="#5f6368" text-anchor="middle">jt.png / svg</text>
  <rect x="180" y="385" width="70" height="70" fill="#ffffff" rx="4" stroke="#e60000" stroke-width="1"/>
  <text x="215" y="415" font-family="Arial, sans-serif" font-size="9" fill="#e60000" text-anchor="middle">80 x 80</text>
  <text x="215" y="465" font-family="Arial, sans-serif" font-size="8" fill="#e60000" text-anchor="middle">px (square)</text>

  <!-- SiCepat Box -->
  <rect x="290" y="330" width="110" height="140" fill="#f3f4f6" rx="10"/>
  <rect x="290" y="330" width="110" height="40" fill="#009944" rx="10"/>
  <text x="345" y="354" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">SiCepat</text>
  <text x="345" y="378" font-family="Arial, sans-serif" font-size="8" fill="#5f6368" text-anchor="middle">sicepat.png / svg</text>
  <rect x="310" y="385" width="70" height="70" fill="#ffffff" rx="4" stroke="#009944" stroke-width="1"/>
  <text x="345" y="415" font-family="Arial, sans-serif" font-size="9" fill="#009944" text-anchor="middle">80 x 80</text>
  <text x="345" y="465" font-family="Arial, sans-serif" font-size="8" fill="#009944" text-anchor="middle">px (square)</text>

  <!-- Format Note -->
  <rect x="420" y="120" width="160" height="250" fill="#fff8e1" rx="10" stroke="#e87722" stroke-width="2"/>
  <text x="500" y="150" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e87722" text-anchor="middle">CATATAN PENTING</text>
  <text x="435" y="175" font-family="Arial, sans-serif" font-size="10" fill="#1b1b18">1. Format: PNG atau SVG</text>
  <text x="435" y="195" font-family="Arial, sans-serif" font-size="10" fill="#1b1b18">2. Ukuran: 80 x 80 pixel</text>
  <text x="435" y="215" font-family="Arial, sans-serif" font-size="10" fill="#1b1b18">3. Background: Transparan</text>
  <text x="435" y="235" font-family="Arial, sans-serif" font-size="10" fill="#1b1b18">   atau putih (#FFFFFF)</text>
  <text x="435" y="255" font-family="Arial, sans-serif" font-size="10" fill="#1b1b18">4. Resolusi: 72-150 DPI</text>
  <text x="435" y="275" font-family="Arial, sans-serif" font-size="10" fill="#1b1b18">5. Aspect ratio: 1:1</text>
  <text x="435" y="295" font-family="Arial, sans-serif" font-size="10" fill="#1b1b18">6. Gunakan logo resmi</text>
  <text x="435" y="315" font-family="Arial, sans-serif" font-size="10" fill="#1b1b18">   dari masing-masing</text>
  <text x="435" y="335" font-family="Arial, sans-serif" font-size="10" fill="#1b1b18">   perusahaan</text>
  <text x="435" y="360" font-family="Arial, sans-serif" font-size="9" fill="#5f6368">* Cek standar logo di:</text>
  <text x="435" y="375" font-family="Arial, sans-serif" font-size="9" fill="#5f6368">brandguidelines.bca.co.id</text>
  <text x="435" y="390" font-family="Arial, sans-serif" font-size="9" fill="#5f6368">brand.bni.co.id</text>
</svg>